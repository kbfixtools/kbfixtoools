<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBFixTools - Image Tools</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#007bff;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.subtitle{
text-align:center;
padding:10px;
color:#555;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:12px;
padding:25px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:15px;
}

.card a{
text-decoration:none;
}

.card button{
background:#007bff;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.card button:hover{
background:#0056b3;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
background:#222;
color:white;
}
</style>

</head>
<body>

<header>KBFixTools</header>

<div class="subtitle">
Free Online Image Tools
</div>

<div class="tools">

<div class="card">
<h3>🖼 Image Resize</h3>
<a href="image-resize.html">

</a>
</div>

<div class="card">

</div>

<div class="card">

</a>
</div>

<div class="card">

</a>
</div>

<div class="card">

<button>Open Tool</button>
</a>

<div class="card">

<a href="image-background.html">

</div>
