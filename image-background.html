<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Background Editor</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 90%;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }
        .tool-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 2px solid #ddd;
            padding-right: 20px;
        }
        .tool-group:last-child {
            border-right: none;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
            border: 2px dashed #007bff;
            border-radius: 5px;
            max-width: 100%;
        }
        .canvas-container canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #draw-canvas {
            position: relative;
            z-index: 2;
            cursor: crosshair;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        .instruction {
            color: #d9534f;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
        }
        .radio-tools {
            display: flex;
            gap: 15px;
            font-size: 16px;
            font-weight: bold;
        }
        /* স্লাইডারের ডিজাইন সুন্দর করার জন্য */
        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>All-in-One Background Editor 🎨</h2>
        
        <div class="controls">
            <div class="tool-group">
                <label><b>1. Upload Image:</b></label>
                <input type="file" id="upload" accept="image/*">
            </div>

            <div class="tool-group">
                <label><b>2. Select Tool:</b></label>
                <div class="radio-tools">
                    <label><input type="radio" name="tool" value="bucket" checked> 🪣 Bucket</label>
                    <label><input type="radio" name="tool" value="brush"> 🖌️ Brush</label>
                    <label><input type="radio" name="tool" value="eraser"> 🧽 Eraser</label>
                </div>
            </div>
            
            <div class="tool-group">
                <label for="color"><b>3. Color:</b></label>
                <input type="color" id="color" value="#007bff">
            </div>

            <div class="tool-group">
                <label><b>Settings:</b></label>
                <label style="font-size: 13px;">Bucket Power: <span id="tolVal">60</span></label>
                <input type="range" id="tolerance" min="0" max="150" value="60">
                
                <!-- ব্রাশের সাইজ কন্ট্রোল করার স্লাইডার (১ থেকে ২০০ পিক্সেল) -->
                <label style="font-size: 13px; margin-top: 5px; font-weight: bold; color: #d9534f;">Brush/Eraser Size: <span id="sizeVal">20</span>px</label>
                <input type="range" id="brushSize" min="1" max="200" value="20">
            </div>
        </div>
        
        <p id="status" class="instruction">👉 Choose 'Bucket' to fill color in one click, or 'Brush/Eraser' to edit manually!</p>

        <div class="canvas-container" id="canvas-container">
            <canvas id="bg-canvas"></canvas>
            <canvas id="draw-canvas"></canvas>
        </div>
        
        <br>
        <button onclick="downloadImage()">Download Final Image</button>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const colorInput = document.getElementById('color');
        const toleranceInput = document.getElementById('tolerance');
        const brushSize = document.getElementById('brushSize');
        const status = document.getElementById('status');

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true });
        const drawCanvas = document.getElementById('draw-canvas');
        const drawCtx = drawCanvas.getContext('2d', { willReadFrequently: true });

        let img = new Image();
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        toleranceInput.addEventListener('input', () => document.getElementById('tolVal').innerText = toleranceInput.value);
        brushSize.addEventListener('input', () => document.getElementById('sizeVal').innerText = brushSize.value);

        upload.addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height = Math.floor(height * (MAX_WIDTH / width));
                        width = MAX_WIDTH;
                    }

                    bgCanvas.width = width;
                    bgCanvas.height = height;
                    drawCanvas.width = width;
                    drawCanvas.height = height;
                    
                    bgCtx.drawImage(img, 0, 0, width, height);
                    drawCtx.clearRect(0, 0, width, height);
                    
                    status.textContent = "👉 Ready! Use Bucket 🪣, Brush 🖌️ or Eraser 🧽";
                    status.style.color = '#28a745';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function getMousePos(e) {
            const rect = drawCanvas.getBoundingClientRect();
            const scaleX = drawCanvas.width / rect.width;
            const scaleY = drawCanvas.height / rect.height;
            return {
                x: Math.floor((e.clientX - rect.left) * scaleX),
                y: Math.floor((e.clientY - rect.top) * scaleY)
            };
        }

        drawCanvas.addEventListener('mousedown', function(e) {
            if (!img.src) return;
            const pos = getMousePos(e);
            const tool = document.querySelector('input[name="tool"]:checked').value;

            if (tool === 'bucket') {
                floodFill(pos.x, pos.y);
            } else {
                isDrawing = true;
                lastX = pos.x;
                lastY = pos.y;
                paint(pos.x, pos.y, false, tool);
            }
        });

        drawCanvas.addEventListener('mousemove', function(e) {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            const tool = document.querySelector('input[name="tool"]:checked').value;
            paint(pos.x, pos.y, true, tool);
            lastX = pos.x;
            lastY = pos.y;
        });

        drawCanvas.addEventListener('mouseup', () => isDrawing = false);
        drawCanvas.addEventListener('mouseout', () => isDrawing = false);

        function paint(x, y, isLine, tool) {
            // ব্রাশের সাইজ এখান থেকে সেট হয়
            drawCtx.lineWidth = brushSize.value;
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';

            if (tool === 'eraser') {
                drawCtx.globalCompositeOperation = 'destination-out';
                drawCtx.strokeStyle = 'rgba(0,0,0,1)';
            } else if (tool === 'brush') {
                drawCtx.globalCompositeOperation = 'source-over';
                drawCtx.strokeStyle = colorInput.value;
            }

            drawCtx.beginPath();
            if (isLine) {
                drawCtx.moveTo(lastX, lastY);
                drawCtx.lineTo(x, y);
            } else {
                drawCtx.moveTo(x, y);
                drawCtx.lineTo(x, y);
            }
            drawCtx.stroke();
        }

        function floodFill(startX, startY) {
            const width = bgCanvas.width;
            const height = bgCanvas.height;

            const bgImgData = bgCtx.getImageData(0, 0, width, height);
            const drawImgData = drawCtx.getImageData(0, 0, width, height);
            
            const bgData = bgImgData.data;
            const drawData = drawImgData.data;

            const startPos = (startY * width + startX) * 4;
            const targetR = bgData[startPos];
            const targetG = bgData[startPos + 1];
            const targetB = bgData[startPos + 2];

            const hex = colorInput.value;
            const fillR = parseInt(hex.slice(1, 3), 16);
            const fillG = parseInt(hex.slice(3, 5), 16);
            const fillB = parseInt(hex.slice(5, 7), 16);
            
            const tolerance = parseInt(toleranceInput.value);
            const toleranceSquared = tolerance * tolerance;

            const stack = [startX, startY];
            const visited = new Uint8Array(width * height);

            while (stack.length > 0) {
                const y = stack.pop();
                const x = stack.pop();

                const idx = y * width + x;
                if (visited[idx]) continue;
                visited[idx] = 1;

                const pos = idx * 4;
                
                const dr = bgData[pos] - targetR;
                const dg = bgData[pos + 1] - targetG;
                const db = bgData[pos + 2] - targetB;
                const distance = (dr * dr) + (dg * dg) + (db * db);

                if (distance <= toleranceSquared) {
                    drawData[pos] = fillR;
                    drawData[pos + 1] = fillG;
                    drawData[pos + 2] = fillB;
                    drawData[pos + 3] = 255;

                    if (x + 1 < width) { stack.push(x + 1, y); }
                    if (x - 1 >= 0) { stack.push(x - 1, y); }
                    if (y + 1 < height) { stack.push(x, y + 1); }
                    if (y - 1 >= 0) { stack.push(x, y - 1); }
                }
            }
            drawCtx.putImageData(drawImgData, 0, 0);
        }

        function downloadImage() {
            if (!img.src) {
                alert("Please upload an image first!");
                return;
            }
            try {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = bgCanvas.width;
                tempCanvas.height = bgCanvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                
                tempCtx.drawImage(bgCanvas, 0, 0);
                tempCtx.drawImage(drawCanvas, 0, 0);

                const link = document.createElement("a");
                link.download = "edited-background-" + Date.now() + ".png";
                link.href = tempCanvas.toDataURL("image/png");
                link.click();
                
                status.textContent = '✅ Image downloaded successfully!';
                status.style.color = '#28a745';
            } catch (error) {
                status.textContent = '❌ Error downloading image';
                status.style.color = '#d9534f';
            }
        }
    </script>
</body>
</html>
