<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compress Tool</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
.container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.2); }
input[type="file"], input[type="range"] { margin: 20px 0; width: 100%; }
button { padding: 10px 20px; background: #0d6efd; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
.download-btn { background: #28a745; text-decoration: none; display: none; margin-top: 15px; }
img { max-width: 100%; margin-top: 20px; border: 1px solid #ddd; display: none; }
.info { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <h2>Image Compress Tool</h2>
    <input type="file" id="upload" accept="image/jpeg, image/png, image/webp">
    
    <div>
        <label>Compression Level: <span id="qualityValue">0.7</span></label>
        <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">
    </div>

    <button id="compressBtn">Compress</button>

    <div class="info">
        <span id="originalSize"></span>
        <span id="compressedSize"></span>
    </div>

    <img id="preview">
    <a id="download" class="download-btn"><button>Download</button></a>
</div>

<script>
const upload = document.getElementById('upload');
const qualityInput = document.getElementById('quality');
const qualityValue = document.getElementById('qualityValue');
const compressBtn = document.getElementById('compressBtn');
const preview = document.getElementById('preview');
const download = document.getElementById('download');
const originalSize = document.getElementById('originalSize');
const compressedSize = document.getElementById('compressedSize');

let originalImage = new Image();
let originalFile;

qualityInput.addEventListener('input', (e) => {
    qualityValue.innerText = e.target.value;
});

upload.addEventListener('change', (e) => {
    originalFile = e.target.files[0];
    if (originalFile) {
        originalSize.innerText = "Original: " + (originalFile.size / 1024).toFixed(2) + " KB";
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(originalFile);
    }
});

compressBtn.addEventListener('click', () => {
    if (!originalFile) return alert("Please upload an image first!");
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = originalImage.width;
    canvas.height = originalImage.height;
    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
    
    const quality = parseFloat(qualityInput.value);
    const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
    
    preview.src = compressedDataUrl;
    preview.style.display = 'block';
    
    download.href = compressedDataUrl;
    download.download = 'compressed_' + originalFile.name;
    download.style.display = 'inline-block';
    
    // Calculate new size
    const base64str = compressedDataUrl.split(',')[1];
    const decoded = atob(base64str);
    compressedSize.innerText = "Compressed: " + (decoded.length / 1024).toFixed(2) + " KB";
});
</script>

</body>
</html>
