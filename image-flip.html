<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Flip Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    padding: 30px;
}
.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,.2);
}
canvas {
    max-width: 100%;
    border: 1px solid #ccc;
    margin-top: 20px;
    display: none; /* ছবি আপলোড করার আগে লুকানো থাকবে */
}
.controls {
    display: none; /* বাটনগুলো লুকানো থাকবে */
    margin-top: 20px;
}
button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    background: #0d6efd;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
}
button:hover {
    background: #084298;
}
.download-btn {
    background: #28a745;
}
.download-btn:hover {
    background: #218838;
}
.reset-btn {
    background: #dc3545;
}
.reset-btn:hover {
    background: #c82333;
}
</style>

</head>
<body>

<div class="container">
    <h2>Image Flip Tool</h2>

    <input type="file" id="upload" accept="image/*"><br>

    <canvas id="canvas"></canvas>

    <div class="controls" id="controls">
        <button onclick="flipHorizontal()">Flip Horizontal ↔</button>
        <button onclick="flipVertical()">Flip Vertical ↕</button>
        <button class="reset-btn" onclick="resetImage()">Reset</button>
        <button class="download-btn" onclick="downloadImage()">Download</button>
    </div>
</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const controls = document.getElementById("controls");

let img = new Image();
let scaleX = 1;
let scaleY = 1;

// ছবি আপলোড করার ফাংশন
upload.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(ev) {
        img.onload = function() {
            // নতুন ছবি আপলোড করলে স্কেল রিসেট হবে
            scaleX = 1;
            scaleY = 1;

            canvas.width = img.width;
            canvas.height = img.height;
            
            // ক্যানভাস এবং বাটন শো করানো
            canvas.style.display = "block";
            controls.style.display = "block";

            draw();
        }
        img.src = ev.target.result;
    }
    reader.readAsDataURL(file);
});

// ক্যানভাসে ছবি ড্র করার প্রধান লজিক
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    
    // Scale -1 হলে ক্যানভাসের উল্টো দিকে চলে যায়, তাই Translate করে ঠিক জায়গায় আনা হয়
    ctx.translate(scaleX === -1 ? canvas.width : 0, scaleY === -1 ? canvas.height : 0);
    ctx.scale(scaleX, scaleY);
    
    ctx.drawImage(img, 0, 0);
    ctx.restore();
}

// অনুভূমিকভাবে (Horizontal) উল্টানো
function flipHorizontal() {
    scaleX = scaleX === 1 ? -1 : 1;
    draw();
}

// লম্বালম্বিভাবে (Vertical) উল্টানো
function flipVertical() {
    scaleY = scaleY === 1 ? -1 : 1;
    draw();
}

// আগের অবস্থায় ফিরিয়ে আনা
function resetImage() {
    scaleX = 1;
    scaleY = 1;
    draw();
}

// ছবি ডাউনলোড করা
function downloadImage() {
    const link = document.createElement("a");
    link.download = "flipped-image.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
