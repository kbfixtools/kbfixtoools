<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Rotate Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
    padding: 30px;
}
.container {
    max-width: 700px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,.2);
}
canvas {
    max-width: 100%;
    border: 1px solid #ddd;
    margin-top: 20px;
    display: none; /* ছবি আপলোডের আগে ক্যানভাস লুকানো থাকবে */
}
.controls {
    display: none; /* ছবি আপলোডের আগে বাটন লুকানো থাকবে */
    margin-top: 20px;
}
button {
    margin: 5px;
    padding: 10px 20px;
    border: none;
    background: #0d6efd;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
}
button:hover {
    background: #0b5ed7;
}
.download-btn {
    background: #28a745;
}
.download-btn:hover {
    background: #218838;
}
.reset-btn {
    background: #dc3545;
}
.reset-btn:hover {
    background: #c82333;
}
</style>
</head>
<body>

<div class="container">
    <h2>Image Rotate Tool</h2>

    <input type="file" id="upload" accept="image/*"><br>

    <canvas id="canvas"></canvas>

    <div class="controls" id="controls">
        <button onclick="rotate(-90)">Rotate Left ↺</button>
        <button onclick="rotate(90)">Rotate Right ↻</button>
        <button class="reset-btn" onclick="resetImage()">Reset</button>
        <button class="download-btn" onclick="downloadImage()">Download</button>
    </div>
</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const controls = document.getElementById("controls");

let img = new Image();
let angle = 0;

upload.addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        img.onload = function(){
            angle = 0; // নতুন ছবি দিলে আগের এঙ্গেল রিসেট হবে
            canvas.style.display = "block";
            controls.style.display = "block";
            drawImage();
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function drawImage(){
    // এঙ্গেলটিকে ০ থেকে ৩৬০ ডিগ্রির মধ্যে নিয়ে আসা
    let normalizedAngle = ((angle % 360) + 360) % 360; 
    const rad = normalizedAngle * Math.PI / 180;

    const w = img.width;
    const h = img.height;

    // যদি এঙ্গেল ৯০ বা ২৭০ ডিগ্রি হয়, তবে width এবং height উল্টে যাবে
    if(normalizedAngle === 90 || normalizedAngle === 270){
        canvas.width = h;
        canvas.height = w;
    } else {
        canvas.width = w;
        canvas.height = h;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // ক্যানভাসের মাঝখানে ট্রান্সলেট করা
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(rad);
    // ছবির মাঝখান থেকে ড্র করা শুরু করা
    ctx.drawImage(img, -w / 2, -h / 2);
    ctx.restore();
}

function rotate(deg){
    angle += deg;
    drawImage();
}

function resetImage(){
    angle = 0;
    drawImage();
}

function downloadImage(){
    const link = document.createElement("a");
    link.download = "rotated-image.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
